services:
  api:
    build: .
    container_name: pharma-mmm-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: pharma-mmm-ui
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
